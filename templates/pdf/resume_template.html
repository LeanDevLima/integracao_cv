<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Currículo</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.5;
            color: #333;
        }
        h1 {
            font-size: 24pt;
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 16pt;
            color: #2c3e50;
            margin-top: 25px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 3px;
        }
        h3 {
            font-size: 13pt;
            color: #34495e;
            margin-bottom: 5px;
        }
        p {
            margin: 5px 0 10px 0;
        }
        ul {
            margin: 5px 0 15px 20px;
            padding: 0;
        }
        li {
            margin-bottom: 5px;
        }
        .container {
            max-width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            border: none;
            margin-bottom: 5px;
            padding-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content|safe }}
    </div>
</body>
</html>
