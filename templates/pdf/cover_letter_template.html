<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carta de Apresentação</title>
    <style>
        @page {
            size: A4;
            margin: 2.5cm;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #222;
        }
        .container {
            max-width: 100%;
        }
        p {
            margin-bottom: 15px;
        }
        /* As cartas de apresentação não costumam ter muitos H1/H2, mas garantimos formatação caso venha do LLM */
        h1, h2, h3 {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content|safe }}
    </div>
</body>
</html>
